<!DOCTYPE html>
<html>
<head>
    <title>Student Data Analyzer</title>

    <!-- Bootstrap (design pro rapide) -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

</head>
<body class="bg-light">

<div class="container mt-5">
    <div class="card shadow p-4">

        <h2 class="text-center mb-4">📊 Student Data Analyzer</h2>

        <form method="POST">
            <div class="mb-3">
                <input type="number" name="age" class="form-control" placeholder="Age" required>
            </div>

            <div class="mb-3">
                <input type="number" name="sommeil" class="form-control" placeholder="Sommeil (heures)" required>
            </div>

            <div class="mb-3">
                <input type="number" name="etude" class="form-control" placeholder="Temps d'étude (heures)" required>
            </div>

            <button class="btn btn-primary w-100">Envoyer</button>
        </form>

    </div>
</div>

</body>
</html>
